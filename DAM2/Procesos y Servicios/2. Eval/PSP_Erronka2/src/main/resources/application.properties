# =====================================================
# ELORSERV BATERATUA - KONFIGURAZIOA
# =====================================================

# Aplikazioaren izena
spring.application.name=ElorServBateratua

# =====================================================
# ZERBITZARI KONFIGURAZIOA
# =====================================================

# REST API ataka (HTTP)
server.port=8080

# Aplikazioaren context path-a
server.servlet.context-path=/elorserv

# TCP Socket zerbitzari ataka
socket.server.port=6000

# =====================================================
# DATU-BASE KONFIGURAZIOA (MySQL)
# =====================================================

# MySQL konexio URL-a
spring.datasource.url=jdbc:mysql://10.5.104.100:3307/elordb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Kredentialak
spring.datasource.username=eloruser
spring.datasource.password=

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE KONFIGURAZIOA
# =====================================================

# Hibernate dialektoa automatikoki detektatzen da

# SQL erakutsi kontsolan (garapen modurako)
spring.jpa.show-sql=true

# SQL formatu egokia
spring.jpa.properties.hibernate.format_sql=true

# Hibernate DDL estrategia (none, validate, update, create, create-drop)
# PRODUKZIORAKO: none edo validate erabili
spring.jpa.hibernate.ddl-auto=update

# Hibernate optimizazioak
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# =====================================================
# LOGGING KONFIGURAZIOA
# =====================================================

# Log maila orokorra
logging.level.root=INFO

# Gure paketeak DEBUG moduan
logging.level.com.elorrieta.elorserv=DEBUG

# Hibernate SQL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================================
# JACKSON KONFIGURAZIOA (JSON serializazioa)
# =====================================================

# Data formatua
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# Time zone
spring.jackson.time-zone=Europe/Madrid

# NULL balioak ez sartu JSON-ean
spring.jackson.default-property-inclusion=non_null

# =====================================================
# ERROREAK
# =====================================================

# Error mezuak erakutsi
server.error.include-message=always
server.error.include-binding-errors=always

# =====================================================
# KONEXIO POOL KONFIGURAZIOA (HikariCP)
# =====================================================

# Konexio maximoak
spring.datasource.hikari.maximum-pool-size=10

# Konexio minimoak
spring.datasource.hikari.minimum-idle=5

# Timeout (30 segundu)
spring.datasource.hikari.connection-timeout=30000

# Idle timeout (10 minutu)
spring.datasource.hikari.idle-timeout=600000

# Max lifetime (30 minutu)
spring.datasource.hikari.max-lifetime=1800000
