  <section class="section">
    <h3>Produktu</h3>
    <div class="formulario">
      <input type="text" id="name" [(ngModel)]="name" placeholder="Produktuaren Izena" required>
      <input type="number" id="price" [(ngModel)]="price">
      <input type="number" id="stock" [(ngModel)]="stock">
      <div class="botones-formulario">
        <button (click)="produktuaSortu()" class="btn-success">✓ Produktua Sortu</button>
        <button (click)="ezabatu()" class="btn-cancel">Atzera</button>
      </div>
    </div>
  </section>
