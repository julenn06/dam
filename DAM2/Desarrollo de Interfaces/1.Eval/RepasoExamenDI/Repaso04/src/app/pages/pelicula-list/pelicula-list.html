<h1>Lista de Películas</h1>

<div class="filters">
  <mat-form-field>
    <mat-label>Buscar</mat-label>
    <input matInput [(ngModel)]="searchQuery" (input)="onSearchChange()" placeholder="Título o director">
  </mat-form-field>

  <mat-form-field>
    <mat-label>Género</mat-label>
    <mat-select [(ngModel)]="selectedGenero" (selectionChange)="onGeneroChange()">
      <mat-option value="">Todos</mat-option>
      <mat-option *ngFor="let genero of generos" [value]="genero">{{ genero }}</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field>
    <mat-label>Año</mat-label>
    <mat-select [(ngModel)]="selectedAno" (selectionChange)="onAnoChange()">
      <mat-option [value]="null">Todos</mat-option>
      <mat-option *ngFor="let ano of anos" [value]="ano">{{ ano }}</mat-option>
    </mat-select>
  </mat-form-field>
</div>

<div class="peliculas-grid">
  <mat-card *ngFor="let pelicula of getPaginatedPeliculas()" class="pelicula-card" (click)="viewPelicula(pelicula.id)">
    <mat-card-header>
      <mat-card-title>{{ pelicula.titulo }}</mat-card-title>
      <mat-card-subtitle>{{ pelicula.director }} ({{ pelicula.ano }})</mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image [src]="pelicula.poster" [alt]="pelicula.titulo" class="pelicula-poster">
    <mat-card-content>
      <p><strong>Género:</strong> {{ pelicula.genero }}</p>
      <p><strong>Rating:</strong> {{ pelicula.rating }}/10</p>
      <p><strong>Duración:</strong> {{ pelicula.duracion }} min</p>
      <p><strong>Recaudación:</strong> ${{ pelicula.recaudacion }}M</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-button color="primary" (click)="viewPelicula(pelicula.id); $event.stopPropagation()">Ver Detalles</button>
      <button mat-button color="warn" (click)="deletePelicula(pelicula.id); $event.stopPropagation()">Eliminar</button>
    </mat-card-actions>
  </mat-card>
</div>

<mat-paginator
  [length]="totalPeliculas"
  [pageSize]="pageSize"
  [pageSizeOptions]="[6, 12, 18]"
  (page)="onPageChange($event)"
  showFirstLastButtons>
</mat-paginator>
