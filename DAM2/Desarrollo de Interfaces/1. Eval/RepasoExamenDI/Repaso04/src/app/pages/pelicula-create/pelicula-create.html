<h1>Crear Nueva Película</h1>

<mat-card>
  <mat-card-content>
    <form class="pelicula-form">
      <mat-form-field>
        <mat-label>Título *</mat-label>
        <input matInput [(ngModel)]="pelicula.titulo" name="titulo" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Director *</mat-label>
        <input matInput [(ngModel)]="pelicula.director" name="director" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Género *</mat-label>
        <mat-select [(ngModel)]="pelicula.genero" name="genero" required>
          <mat-option *ngFor="let genero of generos" [value]="genero">{{ genero }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Actores (separados por coma)</mat-label>
        <input matInput (input)="onActoresChange($any($event.target).value)" name="actores">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Año *</mat-label>
        <input matInput type="number" [(ngModel)]="pelicula.ano" name="ano" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Duración (minutos) *</mat-label>
        <input matInput type="number" [(ngModel)]="pelicula.duracion" name="duracion" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Rating (1-10) *</mat-label>
        <input matInput type="number" min="1" max="10" [(ngModel)]="pelicula.rating" name="rating" required>
      </mat-form-field>

      <mat-form-field>
        <mat-label>Presupuesto (millones $)</mat-label>
        <input matInput type="number" [(ngModel)]="pelicula.presupuesto" name="presupuesto">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Recaudación (millones $)</mat-label>
        <input matInput type="number" [(ngModel)]="pelicula.recaudacion" name="recaudacion">
      </mat-form-field>

      <mat-form-field>
        <mat-label>URL del Poster</mat-label>
        <input matInput [(ngModel)]="pelicula.poster" name="poster">
      </mat-form-field>

      <mat-form-field>
        <mat-label>Sinopsis *</mat-label>
        <textarea matInput [(ngModel)]="pelicula.sinopsis" name="sinopsis" rows="4" required></textarea>
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button (click)="cancel()">
      <mat-icon>cancel</mat-icon>
      Cancelar
    </button>
    <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!isValid()">
      <mat-icon>save</mat-icon>
      Crear Película
    </button>
  </mat-card-actions>
</mat-card>
