<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularioak</title>
</head>



<body>
    <form name="datuak" action="#" method="get" class="form-egitura">

        <input type="text" id="izena" name="izena"><br>
        <label for="abizenak">Idatzi zure abizenak</label><br>
        <input type="text" id="abizenak" name="abizenak"><br>
        <label for="generoa">Generoa idatzi: </label><br>
        <input type="radio" id="gizona" name="generoa" value="gizona">
        <label for="gizona">Gizona</label>
        <input type="radio" id="emakumea" name="generoa" value="emakumea">
        <label for="emakumea">Emakumea</label>
        <input type="radio" id="ez_binarioa" name="generoa" value="ez_binarioa">
        <label for="ez_binarioa">Ez binarioa</label><br><br>
        <button>Bidali</button>
    </form>
</body>

</html>
