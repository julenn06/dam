<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>

<body>

    <table id="taula">
        <tr>
            <th>Izenburua</th>
            <th>Autorea</th>
        </tr>
    </table>

    <script>
        // Datuak deitu
        fetch('liburuak.json')
            .then(response => response.json())
            .then(data => {

                // Liburu bakoitzeko izenburua eta idazlea lortu eta Taulan gehitu
                const taula = document.getElementById("taula");
                data.forEach(liburua => {
                    const row = taula.insertRow();
                    row.insertCell(0).textContent = liburua.izenburua;
                    row.insertCell(1).textContent = liburua.autorea;
                });
            })
            .catch(error => console.error('Errorea JSON Fitxategiari Fetch Egitean:', error));
    </script>
</body>

</html>
