<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 50%;
            margin: 0 auto;
        }

        th {
            background-color: #f2f2f2;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>

<body>

    <h1>XML fitxategi bat irakurri</h1>
    <h5>XML fitxategi bat irakurri eta bere edukia pantailan erakutsi.</h5>

    <table id="taula">
        <tr>
            <th>Id</th>
            <th>Izena</th>
            <th>Gradua</th>
            <th>Dekretua</th>
        </tr>
    </table>

    <script>
        const xmlString = `
        <zikloak>
            <zikloa id="SISA">
                <izena>Sareko Informatika Sistemen Administrazioa</izena>
                <gradua>Goi mailakoa</gradua>
                <dekretua urtea="2009"/>
            </zikloa>
            <zikloa id="WAG">
                <izena>Web aplikazioen garapena</izena>
                <gradua>Goi mailakoa</gradua>
                <dekretua urtea="2010"/>
            </zikloa>
            <zikloa id="MSS">
                <izena>Mikroinformatika Sistemak eta Sareak</izena>
                <gradua>Erdi mailakoa</gradua>
                <dekretua urtea="2008"/>
            </zikloa>
        </zikloak>`;

        let parser = new DOMParser();
        let xmlDoc = parser.parseFromString(xmlString, "text/xml");

        let zikloak = xmlDoc.getElementsByTagName("zikloa");

        for (let i = 0; i < zikloak.length; i++) {
            let id = zikloak[i].getAttribute("id");
            let izena = zikloak[i].getElementsByTagName("izena")[0].textContent;
            let gradua = zikloak[i].getElementsByTagName("gradua")[0].textContent;
            let dekretua = zikloak[i].getElementsByTagName("dekretua")[0].getAttribute("urtea");

            let tr = document.createElement("tr");

            let idTd = document.createElement("td");
            idTd.textContent = id;
            tr.appendChild(idTd);

            let izenaTd = document.createElement("td");
            izenaTd.textContent = izena;
            tr.appendChild(izenaTd);

            let graduaTd = document.createElement("td");
            graduaTd.textContent = gradua;
            tr.appendChild(graduaTd);

            let dekretuaTd = document.createElement("td");
            dekretuaTd.textContent = dekretua;
            tr.appendChild(dekretuaTd);

            document.getElementById("taula").appendChild(tr);
        }
    </script>
</body>

</html>
